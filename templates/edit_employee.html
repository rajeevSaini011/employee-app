{% extends "base.html" %}

{% block title %}Edit Employee{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning">
            <h3>Edit Employee</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            value="{{ employee['name'] }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            value="{{ employee['email'] }}"
                            required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            value="{{ employee['phone'] }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Department</label>

                        <select
                            name="department"
                            class="form-select"
                            required>

                            <option {% if employee['department']=="IT" %}selected{% endif %}>IT</option>
                            <option {% if employee['department']=="HR" %}selected{% endif %}>HR</option>
                            <option {% if employee['department']=="Finance" %}selected{% endif %}>Finance</option>
                            <option {% if employee['department']=="Sales" %}selected{% endif %}>Sales</option>
                            <option {% if employee['department']=="Marketing" %}selected{% endif %}>Marketing</option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Designation</label>

                        <input
                            type="text"
                            name="designation"
                            class="form-control"
                            value="{{ employee['designation'] }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Salary</label>

                        <input
                            type="number"
                            name="salary"
                            class="form-control"
                            value="{{ employee['salary'] }}"
                            required>
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Joining Date</label>

                    <input
                        type="date"
                        name="joining_date"
                        class="form-control"
                        value="{{ employee['joining_date'] }}"
                        required>
                </div>

                <button class="btn btn-success">
                    Update Employee
                </button>

                <a href="/" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
